# Database — read from environment variables, never hardcoded
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Connection pool — important for production load
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JWT — from environment variable
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Logging — no debug in production
logging.level.root=WARN
logging.level.com.taskmanager=INFO
logging.file.name=logs/taskmanager.log

# Never hardcode in prod — read from environment
app.super-admin.email=${SUPER_ADMIN_EMAIL}
app.super-admin.password=${SUPER_ADMIN_PASSWORD}