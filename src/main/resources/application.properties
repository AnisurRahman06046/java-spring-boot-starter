spring.application.name=taskmanager

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/taskdb
spring.datasource.username=anis
spring.datasource.password=anis1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# App name
spring.application.name=taskmanager

# JWT
app.jwt.secret=3f8b2c1d9e4a7f6b0c5d2e1a8f3b9c4d7e2a1f6b0c5d3e8a7f2b1c4d9e6a3f8b
app.jwt.expiration-ms=86400000
# 86400000ms = 24 hours

# ─── Logging ──────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.taskmanager=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Log pattern with timestamp, level, request ID, class, message
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n

# Optional: write logs to a file too
logging.file.name=logs/taskmanager.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n